<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Pro Color Picker</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid #333; }
        h2 { color: #00FF7F; margin-bottom: 20px; }
        .preview { width: 100%; height: 150px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #444; transition: 0.3s; }
        input[type="color"] { width: 100%; height: 50px; border: none; cursor: pointer; background: none; margin-bottom: 15px; }
        .code-box { background: #000; padding: 12px; border-radius: 8px; font-family: monospace; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        button { background: #00FF7F; color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background: #fff; }
        .copy-btn { width: auto; padding: 5px 10px; font-size: 12px; background: #333; color: #00FF7F; }
    </style>
</head>
<body>

<div class="container">
    <h2>Color Picker</h2>
    <div class="preview" id="preview"></div>
    
    <input type="color" id="colorInput" value="#00FF7F" oninput="updateColor()">
    
    <div class="code-box">
        <span id="hexCode">#00ff7f</span>
        <button class="copy-btn" onclick="copyText('hexCode')">COPY</button>
    </div>

    <div class="code-box">
        <span id="rgbCode">rgb(0, 255, 127)</span>
        <button class="copy-btn" onclick="copyText('rgbCode')">COPY</button>
    </div>
</div>

<script>
    function updateColor() {
        const color = document.getElementById('colorInput').value;
        const preview = document.getElementById('preview');
        const hexText = document.getElementById('hexCode');
        const rgbText = document.getElementById('rgbCode');

        preview.style.backgroundColor = color;
        hexText.innerText = color;

        // HEX ni RGB ga o'tkazish
        let r = parseInt(color.slice(1, 3), 16);
        let g = parseInt(color.slice(3, 5), 16);
        let b = parseInt(color.slice(5, 7), 16);
        rgbText.innerText = `rgb(${r}, ${g}, ${b})`;
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("Kod nusxalandi: " + text);
    }

    // Birinchi marta yuklanganda rangni ko'rsatish
    updateColor();
</script>

</body>
</html>
